<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBN Group — Investment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #CFB87C; --gold-dim: #b09a5e; --gold-bg: #faf6ee;
  --ink: #0a0a0a; --ink-soft: #1e1e1e;
  --paper: #f7f4ef; --white: #ffffff;
  --slate: #6b6460; --slate-light: #9c9490;
  --border: #e0dbd2; --border-strong: #c8c0b4;
  --green: #2d6a4f; --green-bg: #eaf3ee;
  --amber: #92400e; --amber-bg: #fef3c7;
  --red: #9b1c1c; --red-bg: #fde8e8;
  --blue: #1e3a5f; --blue-bg: #eff6ff;
  --sidebar-w: 380px;
  --header-h: 56px;
  --tabs-h: 40px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header { height: var(--header-h); background: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; border-bottom: 2px solid var(--gold); flex-shrink: 0; }
.header-left { display: flex; align-items: baseline; gap: 0.6rem; }
.header-left h1 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.02em; }
.header-left span { font-size: 0.7rem; color: var(--slate-light); letter-spacing: 0.12em; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 0.72rem; color: var(--slate-light); font-family: 'Inconsolata', monospace; }


/* ── TABS ── */
.tabs { height: var(--tabs-h); background: var(--ink-soft); display: flex; padding: 0 1.5rem; gap: 0.2rem; align-items: flex-end; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.tab-btn { font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--slate-light); background: none; border: none; padding: 0.5rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.18s; }
.tab-btn:hover { color: #ccc; }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── MAIN LAYOUT ── */
.app-body { display: flex; flex: 1; overflow: hidden; }
.main-area { flex: 1; display: flex; overflow: hidden; }
.sidebar { flex-shrink: 0; width: 300px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.detail { flex: 1; overflow-y: auto; padding: 1.5rem; background: var(--paper); }


/* ── SIDEBAR LIST ── */
.sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--ink); }
.stats-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.stat-item { flex: 1; padding: 0.6rem 0.4rem; text-align: center; cursor: pointer; transition: background 0.15s; border-right: 1px solid var(--border); }
.stat-item:last-child { border-right: none; }
.stat-item:hover { background: var(--gold-bg); }
.stat-item.active-filter { background: var(--gold-bg); border-bottom: 2px solid var(--gold); }
.stat-num { font-family: 'Inconsolata', monospace; font-size: 1.1rem; font-weight: 500; color: var(--ink); display: block; }
.stat-lbl { font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); display: block; margin-top: 0.1rem; }
.deal-list { flex: 1; overflow-y: auto; }
.deal-item { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
.deal-item:hover { background: var(--gold-bg); }
.deal-item.selected { background: var(--gold-bg); border-left: 3px solid var(--gold); }
.deal-name { font-weight: 600; font-size: 0.85rem; color: var(--ink); }
.deal-meta { font-size: 0.72rem; color: var(--slate); margin-top: 0.2rem; }
.deal-price { font-family: 'Inconsolata', monospace; font-size: 0.78rem; color: var(--ink); font-weight: 500; }

/* ── BADGES ── */
.badge { display: inline-block; padding: 0.18rem 0.55rem; border-radius: 2px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.badge-loi { background: var(--blue-bg); color: var(--blue); }
.badge-uc { background: var(--amber-bg); color: var(--amber); }
.badge-closed { background: var(--green-bg); color: var(--green); }
.badge-passed { background: #f3f3f3; color: #888; }
.badge-prospect { background: #f0f0ff; color: #5050c0; }
.badge-active { background: var(--green-bg); color: var(--green); }
.badge-watch { background: var(--amber-bg); color: var(--amber); }

/* ── DETAIL PANEL ── */
.detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--slate-light); font-size: 0.85rem; font-style: italic; }
.deal-detail { max-width: 860px; }
.detail-title-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; gap: 1rem; }
.detail-name { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--ink); line-height: 1.1; }
.detail-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
.btn { font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.4rem 0.85rem; border-radius: 2px; cursor: pointer; border: 1px solid; transition: all 0.15s; }
.btn-outline { background: transparent; border-color: var(--border-strong); color: var(--slate); }
.btn-outline:hover { background: var(--border); }
.btn-gold { background: var(--gold); border-color: var(--gold); color: var(--ink); }
.btn-gold:hover { background: var(--gold-dim); border-color: var(--gold-dim); }
.btn-danger { background: transparent; border-color: #dc2626; color: #dc2626; }
.btn-danger:hover { background: var(--red-bg); }
.btn-green { background: var(--green); border-color: var(--green); color: white; }
.btn-green:hover { background: #1d4d38; }

/* ── FIELDS GRID ── */
.fields-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; margin-bottom: 1.25rem; }
.field-card { background: var(--white); border: 1px solid var(--border); padding: 0.75rem; border-radius: 3px; }
.field-label { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--slate); margin-bottom: 0.35rem; }
.field-value { font-size: 0.88rem; color: var(--ink); font-weight: 500; }
.field-value.mono { font-family: 'Inconsolata', monospace; }
.field-input { width: 100%; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink); font-weight: 500; background: transparent; }
.field-card:focus-within { border-color: var(--gold); background: var(--gold-bg); }

/* ── INNER TABS ── */
.inner-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1.1rem; }
.inner-tab-btn { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--slate); background: none; border: none; cursor: pointer; padding: 0.55rem 1rem; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.inner-tab-btn:hover { color: var(--ink); }
.inner-tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.inner-tab-panel { display: none; }
.inner-tab-panel.active { display: block; }

/* ── PROPERTY INFO PANEL ── */
.info-section { margin-bottom: 1.1rem; }
.info-section-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; margin-bottom: 0.65rem; }
.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 0.5rem; }
.info-field { background: var(--white); border: 1px solid var(--border); border-radius: 3px; padding: 0.55rem 0.75rem; }
.info-label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); margin-bottom: 0.25rem; }
.info-value { font-size: 0.84rem; color: var(--ink); line-height: 1.45; }

/* ── UPDATE LOG ── */
.update-log { list-style: none; margin-bottom: 0.75rem; }
.update-item { padding: 0.6rem 0.75rem; border-radius: 3px; margin-bottom: 0.45rem; background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--border); display: grid; grid-template-columns: auto 1fr auto; gap: 0.4rem 0.7rem; align-items: start; }
.update-meta { display: flex; flex-direction: column; gap: 0.2rem; min-width: 72px; }
.update-date { font-family: 'Inconsolata', monospace; font-size: 0.68rem; color: var(--slate); white-space: nowrap; }
.update-cat { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.12rem 0.4rem; border-radius: 2px; white-space: nowrap; text-align: center; }
.cat-leasing    { background: #e3f2fd; color: #1565c0; } .update-item.cat-leasing    { border-left-color: #1565c0; }
.cat-construction { background: #fff3e0; color: #e65100; } .update-item.cat-construction { border-left-color: #e65100; }
.cat-closing    { background: #f3e5f5; color: #6a1b9a; } .update-item.cat-closing    { border-left-color: #6a1b9a; }
.cat-finance    { background: var(--green-bg); color: var(--green); } .update-item.cat-finance    { border-left-color: var(--green); }
.cat-general    { background: #f0f0f0; color: #666; }    .update-item.cat-general    { border-left-color: #aaa; }
.cat-pm         { background: #fce4ec; color: #c62828; } .update-item.cat-pm         { border-left-color: #c62828; }
.update-text { font-size: 0.84rem; color: var(--ink); line-height: 1.5; padding-top: 0.05rem; }
.update-del { background: none; border: none; cursor: pointer; color: var(--slate-light); font-size: 0.85rem; padding: 0; transition: color 0.15s; }
.update-del:hover { color: var(--red); }
.add-update-row { display: flex; gap: 0.45rem; flex-wrap: wrap; align-items: center; }
.add-update-row input[type=text] { flex: 1; min-width: 160px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 2px; outline: none; background: var(--white); }
.add-update-row input[type=text]:focus { border-color: var(--gold); }
.add-update-row select, .cat-select { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600; padding: 0.38rem 0.5rem; border: 1px solid var(--border); border-radius: 2px; outline: none; background: var(--white); color: var(--ink); cursor: pointer; }
.add-update-row select:focus { border-color: var(--gold); }

/* ── NOTES (legacy compat) ── */
.section-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--ink); margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }

/* ── TASKS ── */
.tasks-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
.task-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.5rem 0.75rem; background: var(--white); border: 1px solid var(--border); border-radius: 3px; }
.task-item.done-task { opacity: 0.55; }
.task-cal { background: none; border: none; cursor: pointer; font-size: 0.85rem; opacity: 0; transition: opacity 0.15s; padding: 0 2px; color: var(--slate); flex-shrink: 0; }
.task-cal:hover { color: var(--gold); }
.task-cal.cal-adding { animation: calSpin 0.8s linear infinite; }
.task-cal.cal-done { color: #2d6a4f; opacity: 1 !important; }
@keyframes calSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.task-item:hover .task-cal { opacity: 1; }
.task-check { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--green); }
.task-text { font-size: 0.82rem; flex: 1; line-height: 1.4; }
.task-text.done { text-decoration: line-through; color: var(--slate); }
.task-text[contenteditable="true"] { outline: none; border-bottom: 1px dashed var(--gold); }
.task-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 0.85rem; opacity: 0; transition: opacity 0.15s; }
.task-item:hover .task-del { opacity: 1; }
.task-del:hover { color: var(--red); }
.add-task-row { display: flex; gap: 0.5rem; }
.add-task-input { flex: 1; border: 1px solid var(--border); border-radius: 2px; padding: 0.45rem 0.65rem; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; outline: none; }
.add-task-input:focus { border-color: var(--gold); }

/* ── ASSETS ── */
.asset-list { display: flex; flex-direction: column; gap: 0; }
.asset-item { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
.asset-item:hover { background: var(--gold-bg); }
.asset-item.selected { background: var(--gold-bg); border-left: 3px solid var(--gold); }

/* ── MODAL for new deal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--white); border-radius: 4px; padding: 1.5rem; width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 1rem; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.3rem; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--slate); }
.form-group input, .form-group select, .form-group textarea { border: 1px solid var(--border); border-radius: 2px; padding: 0.45rem 0.6rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
.modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }

/* ── STAGE SELECT ── */
.stage-select { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; border: 1px solid var(--border); border-radius: 2px; padding: 0.3rem 0.5rem; background: white; cursor: pointer; }

/* ── SCROLLBAR ── */
.deal-list::-webkit-scrollbar, .detail::-webkit-scrollbar, .asset-list::-webkit-scrollbar { width: 5px; }
.deal-list::-webkit-scrollbar-track, .detail::-webkit-scrollbar-track, .asset-list::-webkit-scrollbar-track { background: transparent; }
.deal-list::-webkit-scrollbar-thumb, .detail::-webkit-scrollbar-thumb, .asset-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.deal-list::-webkit-scrollbar-thumb:hover, .detail::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ── DIVIDER ── */
.section-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

/* ── THINKING indicator ── */

/* ── RBN TASKS ── */
.rbn-priority-section { margin-bottom: 1.75rem; }
.rbn-section-header { display: flex; align-items: center; gap: 0.6rem; font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--slate); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.75rem; }
.rbn-priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rbn-priority-dot.urgent { background: #e05c5c; }
.rbn-priority-dot.normal { background: #c9a84c; }
.rbn-priority-dot.someday { background: #5c8fe0; }
.rbn-task-count { margin-left: auto; background: rgba(255,255,255,0.08); color: var(--slate-light); font-size: 0.65rem; padding: 0.1rem 0.45rem; border-radius: 10px; }
.rbn-task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.5rem; border-radius: 3px; transition: background 0.15s; }
.rbn-task-item:hover { background: rgba(255,255,255,0.04); }
.rbn-task-item:hover .rbn-task-del { opacity: 1; }
.rbn-task-cb { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--slate); background: transparent; cursor: pointer; flex-shrink: 0; appearance: none; transition: all 0.15s; }
.rbn-task-cb:checked { background: var(--gold); border-color: var(--gold); }
.rbn-task-text { flex: 1; font-size: 0.84rem; color: #e8e4dc; line-height: 1.4; }
.rbn-task-text.done { text-decoration: line-through; color: var(--slate); }
.rbn-priority-badge { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.12rem 0.4rem; border-radius: 2px; flex-shrink: 0; }
.rbn-priority-badge.urgent { background: rgba(224,92,92,0.15); color: #e05c5c; }
.rbn-priority-badge.normal { background: rgba(201,168,76,0.15); color: #c9a84c; }
.rbn-priority-badge.someday { background: rgba(92,143,224,0.15); color: #5c8fe0; }
.rbn-task-del { background: none; border: none; color: var(--slate-light); cursor: pointer; font-size: 0.9rem; opacity: 0; transition: opacity 0.15s; padding: 0 2px; }
.rbn-empty { color: var(--slate-light); font-size: 0.78rem; font-style: italic; padding: 0.5rem 0.5rem 0; }

@keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>RBN Group</h1>
    <span>Mitch Veremeychik — Investment Tracker</span>
  </div>
  <div class="header-right">
    <span class="header-date" id="headerDate"></span>

  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('acq',this)">Acquisitions</button>
  <button class="tab-btn" onclick="switchTab('assets',this)">Asset Management</button>
  <button class="tab-btn" onclick="switchTab('tasks',this)">RBN Tasks</button>
</div>

<div class="app-body">
  <div class="main-area" id="mainArea">

    <!-- ACQUISITIONS VIEW -->
    <div id="acqView" class="main-area" style="flex:1;overflow:hidden;">
      <div class="sidebar" id="acqSidebar">
        <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;">
          <h2>Pipeline</h2>
          <button class="btn btn-gold" onclick="showNewDealModal()" style="font-size:0.68rem;padding:0.3rem 0.7rem;">+ New</button>
        </div>
        <div class="stats-bar" id="statsBar"></div>
        <div class="deal-list" id="dealList"></div>
      </div>
      <div class="detail" id="acqDetail">
        <div class="detail-empty">Select a deal to view details</div>
      </div>
    </div>

    <!-- ASSETS VIEW -->
    <div id="assetsView" class="main-area" style="flex:1;overflow:hidden;display:none;">
      <div class="sidebar" id="assetSidebar">
        <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;">
          <h2>Portfolio</h2>
          <button class="btn btn-gold" onclick="showNewAssetModal()" style="font-size:0.68rem;padding:0.3rem 0.7rem;">+ New</button>
        </div>
        <div class="asset-list" id="assetList"></div>
      </div>
      <div class="detail" id="assetDetail">
        <div class="detail-empty">Select a property to view details</div>
      </div>
    </div>

    <!-- TASKS VIEW -->
    <div id="tasksView" class="main-area" style="flex:1;overflow:hidden;display:none;">
      <div style="flex:1;overflow-y:auto;padding:1.5rem 2rem;max-width:860px;margin:0 auto;width:100%;">

        <!-- Add Task Bar -->
        <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.75rem;">
          <input id="rbn-task-input" placeholder="Add a task…" style="flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:#e8e4dc;font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:0.6rem 0.9rem;border-radius:3px;outline:none;" onkeydown="if(event.key==='Enter')addRbnTask()">
          <select id="rbn-task-priority" style="background:rgba(255,255,255,0.06);border:1px solid var(--border);color:#e8e4dc;font-family:'DM Sans',sans-serif;font-size:0.78rem;padding:0.6rem 0.7rem;border-radius:3px;outline:none;">
            <option value="urgent">🔴 Urgent</option>
            <option value="normal" selected>🟡 Normal</option>
            <option value="someday">🔵 Someday</option>
          </select>
          <button class="btn btn-gold" onclick="addRbnTask()" style="font-size:0.72rem;padding:0.55rem 1rem;">+ Add</button>
        </div>

        <!-- Urgent -->
        <div class="rbn-priority-section" id="section-urgent">
          <div class="rbn-section-header">
            <span class="rbn-priority-dot urgent"></span>
            <span>Urgent</span>
            <span class="rbn-task-count" id="count-urgent">0</span>
          </div>
          <div class="rbn-task-list" id="list-urgent"></div>
        </div>

        <!-- Normal -->
        <div class="rbn-priority-section" id="section-normal">
          <div class="rbn-section-header">
            <span class="rbn-priority-dot normal"></span>
            <span>Normal</span>
            <span class="rbn-task-count" id="count-normal">0</span>
          </div>
          <div class="rbn-task-list" id="list-normal"></div>
        </div>

        <!-- Someday -->
        <div class="rbn-priority-section" id="section-someday">
          <div class="rbn-section-header">
            <span class="rbn-priority-dot someday"></span>
            <span>Someday</span>

// PERSISTENCE
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'rbnTrackerV21';

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.deals && parsed.assets) state = parsed;
    }
  } catch(e) {}
}

function stageBadge(s) {

  return `<span class="badge badge-${map[s]||'loi'}">${s}</span>`;
}
function statusBadge(s) { return `<span class="badge badge-${s==='Active'?'active':'watch'}">${s}</span>`; }
function catTag(cat) { return `<span class="update-cat cat-${cat||'general'}">${cat||'general'}</span>`; }

// ── INNER TAB SWITCHER ──
function switchInnerTab(btn, panelId) {
  const container = btn.closest('.deal-detail, .asset-detail-body');
  const scope = container || document.querySelector('#acqDetail .deal-detail, #assetDetail .asset-detail-body');
  (scope||document).querySelectorAll('.inner-tab-btn').forEach(b => b.classList.remove('active'));

}

// ── UPDATE LOG RENDERER ──
const CAT_LABELS = { leasing:'Leasing', construction:'Construction', closing:'Closing', finance:'Finance', pm:'Prop. Mgmt', general:'General' };
function renderUpdateLog(notes, type, idx, itemId) {
  return `<div style="margin-top:0.1rem;">
    <ul class="update-log">
      ${notes.length ? notes.map((n,ni)=>`
        <li class="update-item cat-${n.cat||'general'}">
          <div class="update-meta">
            <span class="update-date">${n.date||''}</span>
            <span class="update-cat cat-${n.cat||'general'}">${CAT_LABELS[n.cat]||'General'}</span>
          </div>
          <span class="update-text">${n.text}</span>
          <button class="update-del" onclick="deleteNote('${type}',${idx},${ni})">×</button>
        </li>`).join('')
      : '<li style="font-size:0.84rem;color:var(--slate-light);padding:0.75rem 0;font-style:italic;">No updates yet — add one below.</li>'}
    </ul>
    <div class="add-update-row">
      <select id="upd-cat-${itemId}">
        <option value="general">General</option>
        <option value="leasing">Leasing</option>
        <option value="construction">Construction</option>
        <option value="closing">Closing</option>
        <option value="finance">Finance</option>
        <option value="pm">Prop. Mgmt</option>
      </select>
      <input type="text" id="upd-${itemId}" placeholder="Add an update…" onkeydown="if(event.key==='Enter')addUpdate('${type}',${idx},'${itemId}')">
      <button class="btn btn-outline" onclick="addUpdate('${type}',${idx},'${itemId}')" style="font-size:0.7rem;">Add</button>
    </div>
  </div>`;
}
function addUpdate(type, idx, itemId) {
  const inp = document.getElementById('upd-' + itemId);
  const sel = document.getElementById('upd-cat-' + itemId);
  const text = inp.value.trim(); if (!text) return;
  const note = { date: todayStr(), cat: sel.value, text };
  if (type === 'deal') { state.deals[idx].notes.unshift(note); save(); renderAcq(); }
  else { state.assets[idx].notes.unshift(note); save(); renderAssetDetail(idx); }
}
function deleteNote(type, idx, ni) {
  if (type === 'deal') { state.deals[idx].notes.splice(ni, 1); save(); renderAcq(); }
  else { state.assets[idx].notes.splice(ni, 1); save(); renderAssetDetail(idx); }
}

// ═══════════════════════════════════════════════════════════
// RBN TASKS
// ═══════════════════════════════════════════════════════════
function addRbnTask() {
  const input = document.getElementById('rbn-task-input');
  const text = input.value.trim();
  if (!text) return;
  const priority = document.getElementById('rbn-task-priority').value;
  if (!state.rbnTasks) state.rbnTasks = [];
  state.rbnTasks.push({ id: Date.now(), text, priority, done: false });
  save();
  input.value = '';
  renderRbnTasks();
}

function toggleRbnTask(id) {
  const t = state.rbnTasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderRbnTasks(); }
}

function deleteRbnTask(id) {
  state.rbnTasks = state.rbnTasks.filter(t => t.id !== id);
  save();
  renderRbnTasks();
}

function renderRbnTasks() {
  if (!state.rbnTasks) state.rbnTasks = [];
  const priorities = ['urgent', 'normal', 'someday'];
  priorities.forEach(p => {
    const tasks = state.rbnTasks.filter(t => t.priority === p);
    const list = document.getElementById('list-' + p);
    const count = document.getElementById('count-' + p);
    count.textContent = tasks.filter(t => !t.done).length;
    if (tasks.length === 0) {
      list.innerHTML = `<div class="rbn-empty">No ${p} tasks</div>`;
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="rbn-task-item">
        <input type="checkbox" class="rbn-task-cb" ${t.done ? 'checked' : ''} onchange="toggleRbnTask(${t.id})">
        <span class="rbn-task-text ${t.done ? 'done' : ''}">${t.text}</span>
        <button class="rbn-task-del" onclick="deleteRbnTask(${t.id})">✕</button>
      </div>`).join('');
  });
}

// ═══════════════════════════════════════════════════════════
// ACQUISITIONS
// ═══════════════════════════════════════════════════════════
const STAGES = ['Under Contract','LOI','Prospecting','Closed','Passed'];

function filteredDeals() {
  if (dealFilter === 'active') return state.deals.filter(d => ['Prospecting','LOI','Under Contract'].includes(d.stage));
  return state.deals.filter(d => d.stage === dealFilter);
}

function renderAcq(idx) {
  if (idx !== undefined) selDeal = idx;
  renderStatsBar();
  renderDealList();
  renderDealDetail();
}

function renderStatsBar() {
  const counts = {};
  STAGES.forEach(s => counts[s] = state.deals.filter(d => d.stage === s).length);
  const items = STAGES.map(s => ({ key: s, label: s === 'Under Contract' ? 'Under Contract' : s, num: counts[s] }));
  document.getElementById('statsBar').innerHTML = items.map(item => `
    <div class="stat-item ${dealFilter===item.key?'active-filter':''}" onclick="setFilter('${item.key}')">
      <span class="stat-num">${item.num}</span>
      <span class="stat-lbl">${item.label}</span>
    </div>`).join('');
}

function setFilter(f) {
  dealFilter = f;
  selDeal = null;
  renderAcq();
  document.getElementById('acqDetail').innerHTML = '<div class="detail-empty">Select a deal to view details</div>';
}

function renderDealList() {
  const deals = filteredDeals();
  document.getElementById('dealList').innerHTML = deals.length === 0
    ? '<div style="padding:1.5rem;text-align:center;color:var(--slate-light);font-size:0.82rem;font-style:italic;">No deals in this stage</div>'
    : deals.map((d,i) => `
      <div class="deal-item ${selDeal===i?'selected':''}" onclick="selectDeal(${i})">
        <div class="deal-name">${d.name}</div>
        <div class="deal-meta">${d.market} · ${d.type||'—'}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.35rem;">
          <span class="deal-price">${d.price||'—'}</span>
          ${stageBadge(d.stage)}
        </div>
      </div>`).join('');
}

function selectDeal(i) {
  selDeal = i;
  renderDealList();
  renderDealDetail();
}

function renderDealDetail() {
  const deals = filteredDeals();
  if (selDeal === null || !deals[selDeal]) {
    document.getElementById('acqDetail').innerHTML = '<div class="detail-empty">Select a deal to view details</div>';
    return;
  }
  const d = deals[selDeal];
  const realIdx = state.deals.findIndex(x => x.id === d.id);

  document.getElementById('acqDetail').innerHTML = `
    <div class="deal-detail">
      <div class="detail-title-row">
        <div>
          <div class="detail-name" contenteditable="true" onblur="updateDealField(${realIdx},'name',this.textContent)">${d.name}</div>
          <div style="margin-top:0.4rem;display:flex;gap:0.5rem;align-items:center;">
            ${stageBadge(d.stage)}
            <select class="stage-select" onchange="updateDealField(${realIdx},'stage',this.value)">
              ${STAGES.map(s=>`<option ${d.stage===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="detail-actions">
          ${d.stage==='Under Contract'?`<button class="btn btn-green" onclick="moveToClosed(${realIdx})">Mark Closed →</button>`:''}
          <button class="btn btn-danger" onclick="deleteDeal(${realIdx})">Delete</button>
        </div>
      </div>

      <div class="fields-grid">
        ${fieldCard('Market', d.market||'', realIdx, 'market')}
        ${fieldCard('Type', d.type||'', realIdx, 'type')}
        ${fieldCard('Price', d.price||'', realIdx, 'price', true)}
        ${fieldCard('Size', d.size||'', realIdx, 'size')}
        ${fieldCard('PSF', d.psf||'', realIdx, 'psf', true)}
        ${fieldCard('Cap Rate', d.cap||'', realIdx, 'cap')}
        ${fieldCard('Target Close', d.targetClose||'', realIdx, 'targetClose')}
        ${fieldCard('Entity', d.entity||'', realIdx, 'entity')}
        ${fieldCard('Lender', d.lender||'', realIdx, 'lender')}
      </div>
      <div class="fields-grid" style="grid-template-columns:1fr 1fr;">
        ${fieldCard('Acquisition Broker', d.broker||'', realIdx, 'broker')}
        ${fieldCard('Leasing Broker', d.leasingBroker||'', realIdx, 'leasingBroker')}
      </div>

      <hr class="section-divider">

      <div class="inner-tabs">
        <button class="inner-tab-btn active" onclick="switchInnerTab(this,'dtasks-${d.id}')">Tasks (${(d.tasks||[]).filter(t=>!t.done).length} open)</button>
        <button class="inner-tab-btn" onclick="switchInnerTab(this,'dinfo-${d.id}')">Property Info</button>
        <button class="inner-tab-btn" onclick="switchInnerTab(this,'dlog-${d.id}')">Update Log (${(d.notes||[]).length})</button>
      </div>

      <div class="inner-tab-panel active" id="dtasks-${d.id}">
        <div class="tasks-list" id="tasksDeal${realIdx}">
          ${(d.tasks||[]).map((t,ti)=>`
            <div class="task-item ${t.done?'done-task':''}" id="taskitem-deal-${realIdx}-${ti}">
              <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('deal',${realIdx},${ti})">
              <span class="task-text ${t.done?'done':''}" contenteditable="true" onblur="updateTask('deal',${realIdx},${ti},this.textContent)">${t.text}</span>
              <button class="task-cal" title="Add to Google Calendar" onclick="addTaskToCalendar(this,'${escHtml(d.name)}','${escHtml(t.text)}')">📅</button>
              <button class="task-del" onclick="deleteTask('deal',${realIdx},${ti})">✕</button>
            </div>`).join('')}
        </div>
        <div class="add-task-row">
          <input class="add-task-input" id="newTaskDeal${realIdx}" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask('deal',${realIdx})">
          <button class="btn btn-outline" onclick="addTask('deal',${realIdx})" style="font-size:0.7rem;">Add</button>
        </div>
      </div>

      <div class="inner-tab-panel" id="dinfo-${d.id}">
        ${renderDealInfoPanel(d)}
      </div>

      <div class="inner-tab-panel" id="dlog-${d.id}">
        ${renderUpdateLog(d.notes||[], 'deal', realIdx, d.id)}
      </div>

    </div>`;
}

function fieldCard(label, val, idx, field, mono=false) {
  return `<div class="field-card">
    <div class="field-label">${label}</div>
    <input class="field-input ${mono?'mono':''}" value="${val.replace(/"/g,'&quot;')}" 
      onblur="updateDealField(${idx},'${field}',this.value)" 
      placeholder="—">
  </div>`;
}

function fieldCardAsset(label, val, idx, field, mono=false) {
  return `<div class="field-card">
    <div class="field-label">${label}</div>
    <input class="field-input ${mono?'mono':''}" value="${(val||'').replace(/"/g,'&quot;')}" 
      onblur="updateAssetField(${idx},'${field}',this.value)" 
      placeholder="—">
  </div>`;
}

function updateDealField(idx, field, val) {
  state.deals[idx][field] = val.trim();
  save();
  renderAcq();
}

function addTask(type, idx) {
  const el = document.getElementById(`newTask${type==='deal'?'Deal':'Asset'}${idx}`);
  const text = el.value.trim();
  if (!text) return;
  const task = { text, done: false, id: uid() };
  if (type === 'deal') state.deals[idx].tasks.push(task);
  else state.assets[idx].tasks.push(task);
  save();
  el.value = '';
  if (type === 'deal') renderAcq();
  else renderAssetDetail(idx);
}

function addTaskPrompt(type, idx) {
  const el = document.getElementById(`newTask${type==='deal'?'Deal':'Asset'}${idx}`);
  if (el) el.focus();
}

function toggleTask(type, idx, ti) {
  if (type === 'deal') state.deals[idx].tasks[ti].done = !state.deals[idx].tasks[ti].done;
  else state.assets[idx].tasks[ti].done = !state.assets[idx].tasks[ti].done;
  save();
}

function updateTask(type, idx, ti, val) {
  if (type === 'deal') state.deals[idx].tasks[ti].text = val;
  else state.assets[idx].tasks[ti].text = val;
  save();
}

function deleteTask(type, idx, ti) {
  if (type === 'deal') state.deals[idx].tasks.splice(ti, 1);
  else state.assets[idx].tasks.splice(ti, 1);
  save();
  if (type === 'deal') renderAcq();
  else renderAssets();
}

function escHtml(str) {
  return (str||'').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function addTaskToCalendar(btn, propertyName, taskText) {
  // Extract date from task text if present (e.g. "Mar 6", "March 31")
  const today = new Date();
  const year = today.getFullYear();
  let eventDate = new Date(today);
  eventDate.setDate(eventDate.getDate() + 1); // default: tomorrow

  const dateMatch = taskText.match(/\b(Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(\d{1,2})/i);
  if (dateMatch) {
    const parsed = new Date(`${dateMatch[0]} ${year}`);
    if (!isNaN(parsed)) {
      if (parsed < today) parsed.setFullYear(year + 1);
      eventDate = parsed;
    }
  }

  // Format as YYYYMMDD for Google Calendar
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${eventDate.getFullYear()}${pad(eventDate.getMonth()+1)}${pad(eventDate.getDate())}`;

  const title = encodeURIComponent(`[RBN] ${propertyName} — ${taskText}`);
  const details = encodeURIComponent(`Task from RBN Group Investment Tracker\nProperty: ${propertyName}`);
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}&details=${details}`;

  window.open(url, '_blank');

  btn.classList.add('cal-done');
  btn.textContent = '✓';
  btn.title = `Opened in Google Calendar — ${eventDate.toDateString()}`;
  btn.style.color = '#2d6a4f';
  btn.style.opacity = '1';
  setTimeout(() => {
    btn.textContent = '📅';
    btn.classList.remove('cal-done');
    btn.style.color = '';
    btn.style.opacity = '';
    btn.title = 'Add to Google Calendar';
  }, 3000);
}

function deleteDeal(idx) {
  if (!confirm(`Delete "${state.deals[idx].name}"? This cannot be undone.`)) return;
  state.deals.splice(idx, 1);
  selDeal = null;
  save();
  renderAcq();
}

function moveToClosed(idx) {
  if (!confirm(`Mark "${state.deals[idx].name}" as Closed and add to Asset Management?`)) return;
  const d = state.deals[idx];
  d.stage = 'Closed';
  const asset = {
    id: uid(),
    name: d.name, addr: d.market, type: d.type,
    status: 'Active', closedDate: todayStr(), price: d.price, size: d.size,
    lender: d.lender||'', pm: '', cap: d.cap||'', noi: '', leasingBroker: d.leasingBroker||'',
    notes: [...(d.notes||[])],
    tasks: [...(d.tasks||[])],
    open: true
  };
  state.assets.unshift(asset);
  save();
  selDeal = null;
  renderAcq();
}

function showNewDealModal() { document.getElementById('newDealModal').classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function createNewDeal() {
  const name = document.getElementById('nd-name').value.trim();
  if (!name) return alert('Property name required');
  const deal = {
    id: uid(),
    name, market: document.getElementById('nd-market').value,
    type: document.getElementById('nd-type').value,
    stage: document.getElementById('nd-stage').value,
    price: document.getElementById('nd-price').value,
    size: document.getElementById('nd-size').value,
    cap: document.getElementById('nd-cap').value,
    targetClose: document.getElementById('nd-close').value,
    broker: document.getElementById('nd-broker').value,
    entity: document.getElementById('nd-entity').value,
    psf: '', lender: '',
    notes: [{ date: todayStr(), cat: 'general', text: `Deal created ${todayStr()}.` }],
    tasks: [], open: true
  };
  state.deals.push(deal);
  save();
  closeModal('newDealModal');
  dealFilter = 'active';

  ['nd-name','nd-market','nd-type','nd-price','nd-size','nd-cap','nd-close','nd-broker','nd-entity'].forEach(id => document.getElementById(id).value = '');
}

// ASSETS
// ═══════════════════════════════════════════════════════════
function renderAssets(idx) {
  if (idx !== undefined) selAsset = idx;
  renderAssetList();
  if (selAsset !== null) renderAssetDetail(selAsset);
}

function renderAssetList() {
  document.getElementById('assetList').innerHTML = state.assets.map((a,i) => `
    <div class="asset-item ${selAsset===i?'selected':''}" onclick="selectAsset(${i})">
      <div class="deal-name">${a.name}</div>
      <div class="deal-meta">${a.addr} · ${a.type||'—'}</div>
      <div class="deal-meta" style="margin-top:0.15rem;color:var(--slate-light);">Closed ${a.closedDate||'—'}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.35rem;">
        <span class="deal-price">${a.price||'—'}</span>
        ${statusBadge(a.status||'Active')}
      </div>
    </div>`).join('');
}

function selectAsset(i) {
  selAsset = i;
  renderAssetList();
  renderAssetDetail(i);
}

function renderAssetDetail(idx) {
  const a = state.assets[idx];
  if (!a) return;
  document.getElementById('assetDetail').innerHTML = `
    <div class="deal-detail">
      <div class="detail-title-row">
        <div>
          <div class="detail-name" contenteditable="true" onblur="updateAssetField(${idx},'name',this.textContent)">${a.name}</div>
          <div style="margin-top:0.4rem;display:flex;gap:0.5rem;align-items:center;">
            ${statusBadge(a.status||'Active')}
            <select class="stage-select" onchange="updateAssetField(${idx},'status',this.value)">
              <option ${(a.status||'Active')==='Active'?'selected':''}>Active</option>
              <option ${a.status==='Watch'?'selected':''}>Watch</option>
            </select>
          </div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-danger" onclick="deleteAsset(${idx})">Delete</button>
        </div>
      </div>

      <div class="fields-grid">
        ${fieldCardAsset('Address', a.addr||'', idx, 'addr')}
        ${fieldCardAsset('Type', a.type||'', idx, 'type')}
        ${fieldCardAsset('Price', a.price||'', idx, 'price', true)}
        ${fieldCardAsset('Size', a.size||'', idx, 'size')}
        ${fieldCardAsset('Closed Date', a.closedDate||'', idx, 'closedDate')}
        ${fieldCardAsset('Lender', a.lender||'', idx, 'lender')}
        ${fieldCardAsset('Property Manager', a.pm||'', idx, 'pm')}
        ${fieldCardAsset('Leasing Broker', a.leasing||a.leasingBroker||'', idx, 'leasing')}
        ${fieldCardAsset('Cap Rate', a.cap||'', idx, 'cap')}
        ${fieldCardAsset('NOI', a.noi||'', idx, 'noi', true)}
      </div>

      <hr class="section-divider">

      <div class="inner-tabs">
        <button class="inner-tab-btn active" onclick="switchInnerTab(this,'atasks-${a.id}')">Tasks (${(a.tasks||[]).filter(t=>!t.done).length} open)</button>
        <button class="inner-tab-btn" onclick="switchInnerTab(this,'ainfo-${a.id}')">Property Info</button>
        <button class="inner-tab-btn" onclick="switchInnerTab(this,'alog-${a.id}')">Update Log (${(a.notes||[]).length})</button>
      </div>

      <div class="inner-tab-panel active" id="atasks-${a.id}">
        <div class="tasks-list" id="tasksAsset${idx}">
          ${(a.tasks||[]).map((t,ti)=>`
            <div class="task-item ${t.done?'done-task':''}" id="taskitem-asset-${idx}-${ti}">
              <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('asset',${idx},${ti})">
              <span class="task-text ${t.done?'done':''}" contenteditable="true" onblur="updateTask('asset',${idx},${ti},this.textContent)">${t.text}</span>
              <button class="task-cal" title="Add to Google Calendar" onclick="addTaskToCalendar(this,'${escHtml(a.name)}','${escHtml(t.text)}')">📅</button>
              <button class="task-del" onclick="deleteTask('asset',${idx},${ti})">✕</button>
            </div>`).join('')}
        </div>
        <div class="add-task-row">
          <input class="add-task-input" id="newTaskAsset${idx}" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask('asset',${idx})">
          <button class="btn btn-outline" onclick="addTask('asset',${idx})" style="font-size:0.7rem;">Add</button>
        </div>
      </div>

      <div class="inner-tab-panel" id="ainfo-${a.id}">
        ${renderAssetInfoPanel(a)}
      </div>

      <div class="inner-tab-panel" id="alog-${a.id}">
        ${renderUpdateLog(a.notes||[], 'asset', idx, a.id)}
      </div>

    </div>`;
}

function updateAssetField(idx, field, val) {
  state.assets[idx][field] = (val||'').trim();
  save();
  renderAssets(idx);
}

function deleteAsset(idx) {
  if (!confirm(`Delete "${state.assets[idx].name}"?`)) return;
  state.assets.splice(idx, 1);
  selAsset = null;
  save();
  renderAssets();
  document.getElementById('assetDetail').innerHTML = '<div class="detail-empty">Select a property to view details</div>';
}
